<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="typing-page">
  <header class="app-header ide-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">CT</span>
      <span>Coding Typing Practice</span>
    </a>
    <nav class="top-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="lessons.html">Lessons</a>
      <a class="active" href="typing.html" aria-current="page">Practice</a>
    </nav>
  </header>

  <main class="ide-shell">
    <section class="ide-toolbar" aria-label="Typing controls">
      <div class="ide-title">
        <span class="window-dot red"></span>
        <span class="window-dot yellow"></span>
        <span class="window-dot green"></span>
        <strong>DevOps Typing Workspace</strong>
      </div>
      <div class="ide-controls">
        <label for="lessonSelect">Lesson</label>
        <select id="lessonSelect"></select>
        <label class="file-button compact-button" for="fileInput">Upload .txt</label>
        <input type="file" id="fileInput" accept=".txt">
        <button id="resetButton" class="compact-button" type="button">Reset</button>
        <button id="nextPageButton" class="compact-button ghost-button" type="button">Next file</button>
      </div>
    </section>

    <section class="ide-workbench" aria-label="Code typing editor">
      <aside class="activity-bar" aria-label="Activity">
        <span class="activity-icon active">EX</span>
        <span class="activity-icon">TF</span>
        <span class="activity-icon">AZ</span>
      </aside>

      <aside class="file-explorer" aria-label="Lesson files">
        <div class="explorer-title">Explorer</div>
        <div class="explorer-project">terraform-lab</div>
        <div id="fileTree" class="file-tree"></div>
      </aside>

      <section class="editor-pane">
        <div class="editor-tabs" aria-label="Open file">
          <button id="activeTab" class="editor-tab active" type="button">providers.tf</button>
          <div class="editor-progress" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
        </div>

        <div class="editor-meta">
          <div>
            <span id="lessonType">Terraform lesson</span>
            <strong id="lessonTitle">Azure Terraform Lab</strong>
            <span id="pageCounter">File 1 of 6</span>
          </div>
          <span id="statusMessage" aria-live="polite">Click the editor and start typing.</span>
        </div>

        <div id="editorSurface" class="code-editor" role="textbox" aria-label="Code to type" tabindex="0">
          <div id="editorLines" class="editor-lines"></div>
        </div>
      </section>
    </section>

    <footer class="ide-statusbar" aria-label="Typing status">
      <span id="lineColumn">Ln 1, Col 1</span>
      <span>WPM <strong id="wpm">0</strong></span>
      <span>Accuracy <strong id="accuracy">100%</strong></span>
      <span>Progress <strong id="progressText">0%</strong></span>
      <span>Best <strong id="bestWpm">-</strong></span>
      <span id="mistakes">Mistakes 0</span>
      <span>Time <strong id="timer">0:00</strong></span>
      <span>Next <strong id="nextKey" class="status-key">T</strong></span>
    </footer>

    <textarea id="typingCapture" class="typing-capture" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
  </main>

  <script src="typing.js"></script>
</body>
</html>
